{% extends "base.html" %}

{% block content %}
<div class="max-w-5xl mx-auto space-y-12">
    <!-- Statystyki -->
    <div class="relative overflow-hidden bg-white/80 dark:bg-white/5 backdrop-blur-xl rounded-[3rem] p-8 md:p-16 border border-slate-200 dark:border-white/10 shadow-2xl">
        <div class="relative z-10 flex flex-col md:flex-row items-center gap-12 text-center md:text-left">
            
            <div class="relative w-48 h-48 md:w-64 md:h-64 flex-shrink-0">
                <svg viewBox="0 0 100 100" class="w-full h-full transform -rotate-90">
                    <circle cx="50" cy="50" r="45" fill="none" class="stroke-slate-200 dark:stroke-white/5" stroke-width="8"></circle>
                    <!-- Kółko z progresem: stroke-dasharray="283", dashoffset=283 - (283 * procent / 100) -->
                    {% set offset = 283 - (283 * match_procent / 100) %}
                    <circle cx="50" cy="50" r="45" fill="none" stroke="url(#gradient)" stroke-width="8" stroke-linecap="round" stroke-dasharray="283" stroke-dashoffset="{{ offset }}"></circle>
                    <defs>
                        <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
                            <stop offset="0%" stop-color="#f472b6"></stop>
                            <stop offset="100%" stop-color="#2dd4bf"></stop>
                        </linearGradient>
                    </defs>
                </svg>
                
                <div class="absolute inset-0 flex flex-col items-center justify-center">
                    <span class="text-5xl md:text-6xl font-black bg-clip-text text-transparent bg-gradient-to-r from-pink-500 to-teal-500 dark:from-pink-400 dark:to-teal-400">
                        {{ match_procent }}%
                    </span>
                    <span class="text-sm font-bold text-slate-400 dark:text-gray-400 uppercase tracking-widest mt-1">Match</span>
                </div>
            </div>
            
            <div class="flex-1 space-y-6 w-full">
                <div>
                    <h1 class="text-3xl md:text-4xl font-extrabold mb-2 text-slate-800 dark:text-white">{{ grupa.nazwa_grupy }}</h1>
                    <p class="text-slate-600 dark:text-gray-300 text-lg">Twój wynik dopasowania gustu filmowego z tą grupą.</p>
                </div>
                
                <div class="space-y-4 max-w-md mx-auto md:mx-0 bg-slate-50/50 dark:bg-black/20 p-5 rounded-2xl border border-slate-200/50 dark:border-white/5">
                    <div class="flex justify-between items-center text-sm">
                        <span class="text-slate-600 dark:text-gray-300 flex items-center gap-2"><i data-lucide="star" class="w-4 h-4 text-yellow-500"></i> Podobieństwo ocen</span>
                        <span class="font-bold text-pink-600 dark:text-pink-300">Waga 70%</span>
                    </div>
                    <div class="flex justify-between items-center text-sm">
                        <span class="text-slate-600 dark:text-gray-300 flex items-center gap-2"><i data-lucide="play-circle" class="w-4 h-4 text-teal-500"></i> Wspólna baza</span>
                        <span class="font-bold text-teal-600 dark:text-teal-300">Waga 30%</span>
                    </div>
                </div>
                
                <a href="{{ url_for('main.rate') }}" class="inline-flex w-full md:w-auto px-8 py-4 bg-white dark:bg-white/10 hover:bg-slate-50 dark:hover:bg-white/20 border border-slate-200 dark:border-white/20 text-slate-800 dark:text-white font-bold rounded-xl transition-all shadow-md flex items-center justify-center gap-2">
                    <i data-lucide="heart" class="text-pink-500 fill-current w-5 h-5"></i>
                    Głosuj dalej, by poprawić wynik
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
