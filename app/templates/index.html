{% extends "base.html" %}

{% block content %}
<div class="hero-card">
    <h1>Odkryj wasz wspólny filmowy świat</h1>
    <a href="/register" class="btn-primary">Dołącz teraz</a>
</div>

<div class="movie-grid" style="display: grid; grid-template-columns: repeat(5, 1fr); gap: 1.5rem; margin-top: 3rem;">
    {% for movie in movies %}
    <div class="movie-card">
        <img src="{{ movie.url_plakatu }}" style="width: 100%; aspect-ratio: 2/3; object-fit: cover;">
        <div style="padding: 1.25rem;">
            <h3>{{ movie.tytul }}</h3>
        </div>
    </div>
    {% endfor %}
</div>
{% endblock %}
